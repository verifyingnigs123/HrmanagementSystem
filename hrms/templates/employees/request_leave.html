{% extends "base.html" %}
{% load static %}

{% block title %}Request Leave - HRMS{% endblock %}

{% block content %}
<div class="container-main p-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header bg-primary text-white d-flex align-items-center">
                    <i class="fas fa-edit me-2" style="font-size: 1.5rem;"></i>
                    <h4 class="mb-0">Request Leave</h4>
                </div>

                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="leaveType" class="form-label">Leave Type</label>
                            <select class="form-select" id="leaveType" name="leave_type" required>
                                <option value="">Select Leave Type</option>
                                <option value="vacation">Vacation</option>
                                <option value="sick">Sick Leave</option>
                                <option value="personal">Personal Leave</option>
                                <option value="maternity">Maternity Leave</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="startDate" class="form-label">Start Date</label>
                                    <input type="date" class="form-control" id="startDate" name="start_date" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="endDate" class="form-label">End Date</label>
                                    <input type="date" class="form-control" id="endDate" name="end_date" required>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="reason" class="form-label">Reason for Leave</label>
                            <textarea class="form-control" id="reason" name="reason" rows="4" placeholder="Please provide a reason for your leave request" required></textarea>
                        </div>

                        <div class="alert alert-info">
                            <i class="fas fa-info-circle"></i>
                            <strong>Available Leaves:</strong> 20 days
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-send"></i> Submit Request
                            </button>
                            <a href="{% url 'employee_leave_requests' %}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Back to Requests
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .card {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        border: 1px solid #e9ecef;
    }

    .card-header {
        border-bottom: 2px solid rgba(0, 0, 0, 0.1);
    }

    .form-select, .form-control {
        border-radius: 0.375rem;
    }
</style>
{% endblock %}
