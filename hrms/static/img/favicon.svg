<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .hr-icon-bg { fill: #1877f2; }
      .hr-icon-building { fill: none; stroke: white; stroke-width: 2.5; }
      .hr-icon-window { fill: white; }
      .hr-icon-door { fill: white; }
    </style>
  </defs>
  
  <!-- Blue background circle -->
  <circle cx="50" cy="50" r="50" class="hr-icon-bg"/>
  
  <!-- Building -->
  <rect x="30" y="25" width="40" height="45" class="hr-icon-building" rx="2"/>
  
  <!-- Roof triangle -->
  <polygon points="30,25 50,10 70,25" class="hr-icon-building"/>
  
  <!-- Windows row 1 -->
  <rect x="35" y="30" width="6" height="6" class="hr-icon-window"/>
  <rect x="45" y="30" width="6" height="6" class="hr-icon-window"/>
  <rect x="55" y="30" width="6" height="6" class="hr-icon-window"/>
  <rect x="65" y="30" width="6" height="6" class="hr-icon-window"/>
  
  <!-- Windows row 2 -->
  <rect x="35" y="42" width="6" height="6" class="hr-icon-window"/>
  <rect x="45" y="42" width="6" height="6" class="hr-icon-window"/>
  <rect x="55" y="42" width="6" height="6" class="hr-icon-window"/>
  <rect x="65" y="42" width="6" height="6" class="hr-icon-window"/>
  
  <!-- Door -->
  <rect x="46" y="55" width="8" height="15" class="hr-icon-door"/>
  <circle cx="52" cy="62" r="1.5" fill="#1877f2"/>
</svg>